<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache" />
    <title>Neuron Anatomy</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div id="app">
      <canvas id="scene"></canvas>
      <div id="hud">
        <h1>Neuron Anatomy</h1>
        <p>Drag to rotate, scroll to zoom, right-drag to pan. Hover a part to see its name.</p>
        <p class="hud-note">
          Put your cell at <code>public/neuron.glb</code>. Name Blender objects or materials
          <code>Soma</code>, <code>Axon</code>, <code>Dendrites</code>, etc., so hover labels match.
        </p>
      </div>
      <div id="part-caption" aria-live="polite">
        <div id="part-name"></div>
        <p id="part-desc"></p>
      </div>
      <div id="status">Loading…</div>
    </div>
    <script type="module">
      import(`./app.js?t=${Date.now()}`);
    </script>
  </body>
</html>
